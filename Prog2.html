<!DOCTYPE html>
<html>

<head>
    <title>Navbar</title>

    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            font-size: 16px;
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.8em;
            color: #666;
            background-color: #b6f8ef;
        }

        /* Navbar */
        .topnav {
            overflow: hidden;
            background-color: #333;
        }

        .topnav a {
            float: left;
            color: #1affa3;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }

        .topnav a:hover {
            background-color: #ddd;
            color: black;
        }

        .topnav a.active {
            background-color: #ffe066;
            color: black;
        }

        /* Image sections */
        .pimg1,
        .pimg2,
        .pimg3 {
            position: relative;
            opacity: 0.7;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .pimg1 {
            background-image: url('image1.jpg');
            min-height: 100%;
        }

        .pimg2 {
            background-image: url('image2.jpg');
            min-height: 400px;
        }

        .pimg3 {
            background-image: url('image3.jpg');
            min-height: 400px;
        }

        /* Section */
        .section {
            text-align: center;
            padding: 50px 80px;
        }

        .section-dark {
            background-color: #282e34;
            color: #ddd;
        }

        /* Text on image */
        .ptext {
            position: absolute;
            top: 50%;
            width: 100%;
            text-align: center;
            color: #000;
            font-size: 27px;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .ptext .border {
            background-color: #111;
            color: #fff;
            padding: 20px;
        }

        .ptext .border.trans {
            background-color: transparent;
        }

        /* Responsive */
        @media(max-width:568px) {

            .pimg1,
            .pimg2,
            .pimg3 {
                background-attachment: scroll;
            }
        }
    </style>
</head>

<body>

    <div class="topnav">
        <a class="active" href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Gallery</a>
    </div>

    <br>

    <h1 style="text-align:center;">Welcome all to this website</h1>

    <section>
        <h2>Chinese cuisine</h2>
        <p>
            Chinese cuisine is an important part of Chinese culture, which includes cuisine
            originating from different regions of China. It has influenced many cuisines worldwide.
        </p>
    </section>

    <div class="pimg3">
        <div class="ptext">
            <span class="border trans">Image Text</span>
        </div>
    </div>

    <section class="section section-dark">
        <span>All © rights reserved by Swati Singh</span>
    </section>

</body>

</html>
